training:
  report_to: "none"

  # Checkpointing
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1"
  greater_is_better: true
  save_strategy: "steps"
  save_steps: 160
  save_total_limit: 3

  # Early stopping
  early_stopping_patience: 30000

  # Epochs & warmup
  num_train_epochs: 5
  warmup_steps: 5
  max_grad_norm: 1.0

  # Evaluation & logging
  eval_strategy: "steps"
  eval_steps: 16  # evaluate less frequently
  logging_steps: 16
  logging_first_step: true
  enable_confusion_matrix_after_training: true
