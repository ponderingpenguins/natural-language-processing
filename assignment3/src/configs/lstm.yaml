lstm_model:
  vocab_size: 30522
  embed_dim: 256        # reduce from 768 (overkill for 4-class task)
  hidden_dim: 256       # reduce from 512
  num_classes: 4
  num_layers: 1         # reduce from 2
  bidirectional: true
  learning_rate: 1e-3   # keep this
  sequence_length: 256
  dropout: 0.6          # increase from 0.5
  weight_decay: 0.05    # increase from 0.01
  tokenizer_name: "bert-base-uncased"
  init_embeddings_from_bert: false  # don't use BERT embeddings, train from scratch
  output_dir: "./lstm_output"
  per_device_train_batch_size: 16   # reduce batch size to add noise
  per_device_eval_batch_size: 32
  logging_dir: "./lstm_logs"
  grid_learning_rates: [1e-3]
  grid_max_lengths: [256]
  grid_batch_sizes: [16]